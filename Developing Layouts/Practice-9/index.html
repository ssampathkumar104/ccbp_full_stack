<!DOCTYPE html>
<html>

<head>
 <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous" />
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
</head>

<body>

    <div class="container products-section">
        <div class="row">

            <!-- Heading -->
            <div class="col-12">
                <h1 class="products-section-heading pb-3">Products</h1>
            </div>

            <!-- Product 1 -->
            <div class="col-12 col-md-6">
                <div class="product-card vr-headset-bg-container d-flex flex-column justify-content-end p-3 mb-4">
                    <h1 class="product-card-title">VR Headset</h1>
                    <p class="product-card-price">Rs 75,000</p>
                    <button class="buy-now-button">Buy Now</button>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="col-12 col-md-6">
                <div class="product-card vr-headset-controllers-bg-container d-flex flex-column justify-content-end p-3 mb-4">
                    <h1 class="product-card-title">VR Headset and Two Touch Controllers</h1>
                    <p class="product-card-price">Rs 90,000</p>
                    <button class="buy-now-button">Buy Now</button>
                </div>
            </div>

            <!-- View All Button -->
            <div class="col-12 d-flex justify-content-end">
                <button class="btn btn-primary px-4">View All</button>
            </div>

        </div>
    </div>

</body>

</html>
